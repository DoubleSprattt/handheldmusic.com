    <style>
      body {
        background: #0b0b0c;
        color: #fff;
      }
      .app-image {
        height: 240px;
        width: 100%;
        object-fit: cover;
        border-radius: 0.5rem;
        filter: brightness(0.92);
        transition:
          transform 0.25s ease,
          filter 0.25s ease;
      }
      .app-image:hover {
        transform: scale(1.03);
        filter: brightness(1);
      }
      .big {
        font-size: 1.05rem;
        line-height: 1.5;
      }
      .app-card {
        background: #0b0b0c;
